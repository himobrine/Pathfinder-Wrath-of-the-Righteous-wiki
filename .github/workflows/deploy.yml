name: 部署到 GitHub Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  deploy:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: 上传 Pages 产物
        uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - name: 部署到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
